<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prayer Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0E0B08;
  --surface:#161109;
  --surface2:#1E1610;
  --surface3:#261D12;
  --gold:#C9A96E;
  --gold-bright:#E2C48A;
  --gold-dim:#8A6E42;
  --gold-glow:rgba(201,169,110,0.12);
  --gold-glow2:rgba(201,169,110,0.06);
  --cream:#F5EDD8;
  --cream-dim:#C8B898;
  --cream-muted:#8A7A60;
  --border:rgba(201,169,110,0.15);
  --border2:rgba(201,169,110,0.08);
  --green:#6BAF7A;
  --radius:16px;
  --radius-sm:10px;
}

html{scroll-behavior:smooth}

body{
  font-family:'Jost',sans-serif;
  background:var(--bg);
  color:var(--cream);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%,rgba(201,169,110,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%,rgba(201,169,110,0.05) 0%,transparent 55%);
  pointer-events:none;z-index:0;
}

body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.35;pointer-events:none;z-index:0;
}

.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding-bottom:4rem}

/* Header */
.header{text-align:center;padding:3.5rem 1rem 2.5rem}
.header-ornament{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:1.5rem}
.oline{height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--gold-dim))}
.oline.r{background:linear-gradient(90deg,var(--gold-dim),transparent)}
.dove-wrap{
  width:50px;height:50px;border-radius:50%;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  background:var(--gold-glow);font-size:20px;
  box-shadow:0 0 28px var(--gold-glow),inset 0 1px 0 rgba(255,255,255,0.05);
}
.header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(32px,7vw,50px);font-weight:400;
  letter-spacing:0.06em;color:var(--gold-bright);
  text-shadow:0 0 40px rgba(201,169,110,0.3);
  margin-bottom:0.5rem;
}
.header-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-style:italic;
  color:var(--cream-muted);letter-spacing:0.04em;
}

/* Nav */
.nav{
  display:flex;gap:3px;
  margin:0 1rem 2rem;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:4px;
}
.nav-btn{
  flex:1;padding:10px 6px;
  font-family:'Jost',sans-serif;
  font-size:11px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;
  border-radius:12px;border:none;
  background:transparent;color:var(--cream-muted);
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.nav-btn:hover{color:var(--gold)}
.nav-btn.active{
  background:linear-gradient(135deg,var(--surface3),rgba(201,169,110,0.08));
  color:var(--gold-bright);
  border:1px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,0.3),inset 0 1px 0 rgba(201,169,110,0.1);
}

/* Notif */
.notif{
  margin:0 1rem 1rem;padding:12px 18px;
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
  border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;color:var(--gold);letter-spacing:0.02em;text-align:center;
  display:none;animation:fadeSlide 0.25s ease;
}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* Section */
.section{display:none;padding:0 1rem;animation:fadeIn 0.3s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.section-label{
  font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--gold-dim);margin-bottom:1.2rem;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border2)}

/* Chips */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.chip{
  padding:6px 16px;
  font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;
  border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--cream-muted);
  cursor:pointer;transition:all 0.2s;
}
.chip:hover{border-color:var(--gold-dim);color:var(--gold)}
.chip.active{border-color:var(--gold-dim);background:var(--gold-glow);color:var(--gold-bright)}

/* Prayer card */
.prayer-card{
  background:linear-gradient(145deg,var(--surface),var(--surface2));
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:1.5rem;margin-bottom:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
  position:relative;overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.prayer-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,0.3),transparent);
}
.prayer-card:hover{border-color:var(--border);box-shadow:0 8px 32px rgba(0,0,0,0.4)}

.card-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--surface3),var(--surface2));
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);flex-shrink:0;
}
.meta{flex:1;min-width:0}
.poster-name{font-size:14px;font-weight:500;color:var(--cream);letter-spacing:0.02em}
.post-date{font-size:12px;color:var(--cream-muted);margin-top:1px}

.tag{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.tag-anon{border:1px solid rgba(201,169,110,0.2);color:var(--gold-dim);background:rgba(201,169,110,0.05)}
.tag-cat{border:1px solid rgba(201,169,110,0.25);color:var(--gold);background:rgba(201,169,110,0.08)}
.tag-answered{border:1px solid rgba(107,175,122,0.3);color:var(--green);background:rgba(107,175,122,0.08)}

.prayer-text{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:300;line-height:1.75;color:var(--cream-dim);
  margin-bottom:16px;
  border-left:2px solid rgba(201,169,110,0.2);padding-left:14px;
}

.card-footer{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.pray-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 18px;
  font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;
  border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--cream-muted);
  cursor:pointer;transition:all 0.2s;
}
.pray-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.pray-btn.prayed{border-color:var(--gold-dim);background:var(--gold-glow);color:var(--gold-bright)}
.pray-heart{font-size:14px;transition:transform 0.2s}
.pray-btn:hover .pray-heart,.pray-btn.prayed .pray-heart{transform:scale(1.15)}
.pray-count{font-size:11px;color:var(--cream-muted);margin-left:2px}
.pray-btn.prayed .pray-count{color:var(--gold-dim)}

.answered-btn{
  margin-left:auto;padding:8px 18px;
  font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;
  border-radius:20px;border:1px solid rgba(107,175,122,0.25);
  background:transparent;color:var(--green);
  cursor:pointer;transition:all 0.2s;
}
.answered-btn:hover,.answered-btn.done{background:rgba(107,175,122,0.1)}

/* Form */
.form-wrap{
  background:linear-gradient(145deg,var(--surface),var(--surface2));
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,0.3);
  position:relative;overflow:hidden;
}
.form-wrap::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,0.3),transparent);
}
.form-title{
  font-family:'Playfair Display',serif;
  font-size:24px;font-weight:400;font-style:italic;
  color:var(--gold-bright);margin-bottom:1.5rem;letter-spacing:0.02em;
}
.field{margin-bottom:16px}
.field label{
  font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--cream-muted);display:block;margin-bottom:7px;
}
.field input,.field textarea,.field select{
  width:100%;padding:11px 14px;
  border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:rgba(0,0,0,0.3);color:var(--cream);
  font-family:'Cormorant Garamond',serif;font-size:17px;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:var(--gold-dim);box-shadow:0 0 0 3px var(--gold-glow2);
}
.field input::placeholder,.field textarea::placeholder{color:var(--cream-muted);opacity:0.6}
.field textarea{resize:vertical;min-height:100px;line-height:1.6}
.field select option{background:var(--surface2);color:var(--cream)}

.checkbox-row{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--cream-muted);cursor:pointer;
  font-family:'Jost',sans-serif;letter-spacing:0.02em;
}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}

.submit-btn{
  width:100%;margin-top:18px;padding:13px;
  font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;
  border-radius:var(--radius-sm);border:1px solid var(--gold-dim);
  background:linear-gradient(135deg,rgba(201,169,110,0.15),rgba(201,169,110,0.06));
  color:var(--gold-bright);cursor:pointer;transition:all 0.25s;
}
.submit-btn:hover{
  border-color:var(--gold);
  background:linear-gradient(135deg,rgba(201,169,110,0.22),rgba(201,169,110,0.1));
  box-shadow:0 0 28px var(--gold-glow);
}

/* Verses */
.verse-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.verse-title{
  font-family:'Playfair Display',serif;
  font-size:24px;font-weight:400;font-style:italic;color:var(--gold-bright);
}
.verse-sub{font-size:12px;color:var(--cream-muted);margin-top:4px;letter-spacing:0.03em}
.ai-pill{
  font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;
  border:1px solid rgba(107,175,122,0.3);color:var(--green);
  background:rgba(107,175,122,0.08);display:inline-block;margin-left:8px;vertical-align:middle;
}
.refresh-btn{
  padding:8px 16px;
  font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;
  border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--cream-muted);
  cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0;
}
.refresh-btn:hover{border-color:var(--gold-dim);color:var(--gold)}

.verse-card{
  background:linear-gradient(145deg,var(--surface),var(--surface2));
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:1.75rem;margin-bottom:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
  position:relative;overflow:hidden;
}
.verse-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,0.25),transparent);
}
.verse-card::after{
  content:'\201C';position:absolute;top:8px;right:18px;
  font-family:'Playfair Display',serif;font-size:90px;line-height:1;
  color:rgba(201,169,110,0.05);pointer-events:none;
}
.verse-ref{
  font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--gold-dim);margin-bottom:12px;
}
.verse-text{
  font-family:'Cormorant Garamond',serif;
  font-size:21px;font-style:italic;font-weight:300;
  line-height:1.8;color:var(--cream);margin-bottom:16px;
}
.verse-divider{height:1px;background:linear-gradient(90deg,var(--border2),transparent);margin-bottom:14px}
.verse-reflection{font-size:13px;color:var(--cream-muted);line-height:1.65;letter-spacing:0.02em}

.verse-loading{
  text-align:center;padding:3rem 1rem;
  border:1px solid var(--border2);border-radius:var(--radius);
  background:var(--surface);color:var(--cream-muted);font-size:14px;letter-spacing:0.03em;
}
.spinner{
  width:24px;height:24px;border-radius:50%;
  border:2px solid var(--border2);border-top-color:var(--gold-dim);
  animation:spin 0.8s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.answered-intro{
  text-align:center;margin-bottom:1.5rem;padding:1.25rem;
  background:linear-gradient(135deg,rgba(107,175,122,0.05),rgba(107,175,122,0.02));
  border:1px solid rgba(107,175,122,0.12);border-radius:var(--radius);
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:16px;color:rgba(107,175,122,0.8);letter-spacing:0.04em;
}

.empty{
  text-align:center;padding:3rem 1rem;
  font-size:14px;color:var(--cream-muted);letter-spacing:0.03em;line-height:1.8;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-ornament">
      <div class="oline"></div>
      <div class="dove-wrap">🕊</div>
      <div class="oline r"></div>
    </div>
    <h1>Prayer Wall</h1>
    <p class="header-sub">Lift each other up in prayer</p>
  </div>

  <nav class="nav" id="nav">
    <button class="nav-btn active" data-tab="wall">Wall</button>
    <button class="nav-btn" data-tab="verses">Daily Verses</button>
    <button class="nav-btn" data-tab="post">Submit</button>
    <button class="nav-btn" data-tab="answered">Answered</button>
  </nav>

  <div class="notif" id="notif"></div>

  <!-- Prayer Wall -->
  <div class="section active" id="sec-wall">
    <div class="section-label">Active requests</div>
    <div class="filter-row" id="filter-row">
      <button class="chip active" data-cat="all">All</button>
      <button class="chip" data-cat="Healing">Healing</button>
      <button class="chip" data-cat="Family">Family</button>
      <button class="chip" data-cat="Guidance">Guidance</button>
      <button class="chip" data-cat="Thanksgiving">Thanksgiving</button>
    </div>
    <div id="prayers-list"></div>
  </div>

  <!-- Daily Verses -->
  <div class="section" id="sec-verses">
    <div class="verse-header">
      <div>
        <div class="verse-title">Daily Verses <span class="ai-pill">AI</span></div>
        <div class="verse-sub">Scripture matched to your community's prayers</div>
      </div>
      <button class="refresh-btn" id="refresh-btn">&#8635; Refresh</button>
    </div>
    <div class="filter-row" id="verse-cat-row">
      <button class="chip active" data-vcat="Healing">Healing</button>
      <button class="chip" data-vcat="Family">Family</button>
      <button class="chip" data-vcat="Guidance">Guidance</button>
      <button class="chip" data-vcat="Thanksgiving">Thanksgiving</button>
      <button class="chip" data-vcat="Work & Provision">Provision</button>
      <button class="chip" data-vcat="Strength">Strength</button>
    </div>
    <div id="verses-list"></div>
  </div>

  <!-- Submit -->
  <div class="section" id="sec-post">
    <div class="form-wrap">
      <div class="form-title">Share your heart</div>
      <div class="field">
        <label>Your name (optional)</label>
        <input type="text" id="req-name" placeholder="e.g. Maria Santos"/>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="req-cat">
          <option>Healing</option>
          <option>Family</option>
          <option>Guidance</option>
          <option>Thanksgiving</option>
          <option>Work &amp; Provision</option>
          <option>Strength</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Your prayer request</label>
        <textarea id="req-text" placeholder="Share what's on your heart…"></textarea>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="req-anon"/>
        Post anonymously
      </label>
      <button class="submit-btn" id="submit-btn">Submit Prayer Request</button>
    </div>
  </div>

  <!-- Answered -->
  <div class="section" id="sec-answered">
    <div class="answered-intro">&#10022; &nbsp; Testimonies of God's faithfulness &nbsp; &#10022;</div>
    <div id="answered-list"></div>
  </div>

</div>

<script>
// ── Config ─────────────────────────────────────────────────
// Replace "YOUR_API_KEY_HERE" with your Anthropic API key.
// In production, always proxy API calls through a backend server
// to keep your key secret. Get a key at: https://console.anthropic.com
const ANTHROPIC_API_KEY = "YOUR_API_KEY_HERE";
const API_URL = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-20250514";

// ── State ──────────────────────────────────────────────────
let filterCat = "all";
let currentVerseCat = "Healing";
let verseCache = {};
let nextId = 5;

let prayers = [
  {id:1,name:"Ana Reyes",anon:false,cat:"Healing",text:"Please pray for my mother who is recovering from surgery. May God grant her a speedy and full recovery.",date:"Apr 25",prayCount:12,prayed:false,answered:false,isOwn:false},
  {id:2,name:"Anonymous",anon:true,cat:"Guidance",text:"I'm at a crossroads in my career and don't know which path to take. Please pray for clarity and God's direction.",date:"Apr 26",prayCount:8,prayed:false,answered:false,isOwn:false},
  {id:3,name:"Marco Lim",anon:false,cat:"Family",text:"Asking for prayers for unity and peace in our family. There has been a lot of tension lately and we need God's healing.",date:"Apr 26",prayCount:5,prayed:false,answered:false,isOwn:false},
  {id:4,name:"You",anon:false,cat:"Thanksgiving",text:"Thank God for blessing our community with a new church building! His faithfulness is beyond measure.",date:"Apr 27",prayCount:3,prayed:false,answered:false,isOwn:true},
];

// ── Helpers ────────────────────────────────────────────────
function initials(n) {
  if (n === "Anonymous") return "\u2726";
  return n.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
}

function showNotif(msg) {
  const el = document.getElementById("notif");
  el.textContent = msg; el.style.display = "block";
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = "none"; }, 2800);
}

// ── Tabs ───────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  ["wall","verses","post","answered"].forEach(id => {
    document.getElementById("sec-" + id).classList.toggle("active", id === tab);
  });
  if (tab === "wall") renderPrayers();
  if (tab === "answered") renderAnswered();
  if (tab === "verses") {
    if (!verseCache[currentVerseCat]) loadVerses(currentVerseCat);
    else renderVerses(currentVerseCat);
  }
}
document.getElementById("nav").addEventListener("click", e => {
  if (e.target.classList.contains("nav-btn")) showTab(e.target.dataset.tab);
});

// ── Filter chips ───────────────────────────────────────────
document.getElementById("filter-row").addEventListener("click", e => {
  if (!e.target.classList.contains("chip")) return;
  filterCat = e.target.dataset.cat;
  document.querySelectorAll("#filter-row .chip").forEach(c => c.classList.remove("active"));
  e.target.classList.add("active");
  renderPrayers();
});

// ── Render prayer wall ─────────────────────────────────────
function renderPrayers() {
  const list = document.getElementById("prayers-list");
  const active = prayers.filter(p => !p.answered && (filterCat === "all" || p.cat === filterCat));
  if (!active.length) {
    list.innerHTML = '<div class="empty">No prayer requests here yet.<br>Be the first to share.</div>';
    return;
  }
  list.innerHTML = active.map(p => `
    <div class="prayer-card">
      <div class="card-top">
        <div class="avatar">${initials(p.name)}</div>
        <div class="meta">
          <div class="poster-name">${p.name}</div>
          <div class="post-date">${p.date}</div>
        </div>
        ${p.anon ? '<span class="tag tag-anon">Anonymous</span>' : ''}
        <span class="tag tag-cat">${p.cat}</span>
      </div>
      <div class="prayer-text">${p.text}</div>
      <div class="card-footer">
        <button class="pray-btn${p.prayed ? ' prayed' : ''}" onclick="togglePray(${p.id})">
          <span class="pray-heart">${p.prayed ? '🤎' : '🤍'}</span>
          I prayed
          <span class="pray-count">${p.prayCount}</span>
        </button>
        ${p.isOwn ? `<button class="answered-btn${p.answered ? ' done' : ''}" onclick="markAnswered(${p.id})">${p.answered ? '&#10003; Answered' : 'Mark Answered'}</button>` : ''}
      </div>
    </div>`).join("");
}

// ── Render answered ────────────────────────────────────────
function renderAnswered() {
  const list = document.getElementById("answered-list");
  const ans = prayers.filter(p => p.answered);
  if (!ans.length) {
    list.innerHTML = '<div class="empty">No answered prayers yet —<br>keep praying, trust His timing.</div>';
    return;
  }
  list.innerHTML = ans.map(p => `
    <div class="prayer-card">
      <div class="card-top">
        <div class="avatar">${initials(p.name)}</div>
        <div class="meta">
          <div class="poster-name">${p.name}</div>
          <div class="post-date">${p.date}</div>
        </div>
        <span class="tag tag-answered">Answered</span>
        <span class="tag tag-cat">${p.cat}</span>
      </div>
      <div class="prayer-text">${p.text}</div>
      <div class="card-footer">
        <span style="font-size:13px;color:var(--cream-muted);letter-spacing:0.02em">🤎 ${p.prayCount} people prayed</span>
      </div>
    </div>`).join("");
}

// ── Actions ────────────────────────────────────────────────
function togglePray(id) {
  const p = prayers.find(x => x.id === id); if (!p) return;
  p.prayed = !p.prayed; p.prayCount += p.prayed ? 1 : -1;
  showNotif(p.prayed ? "🙏 Your prayer has been counted" : "Prayer removed");
  renderPrayers();
}
function markAnswered(id) {
  const p = prayers.find(x => x.id === id); if (!p || p.answered) return;
  p.answered = true;
  showNotif("✦ Praise God! Marked as answered!");
  renderPrayers();
}

// ── Submit form ────────────────────────────────────────────
document.getElementById("submit-btn").addEventListener("click", () => {
  const name = document.getElementById("req-name").value.trim();
  const anon = document.getElementById("req-anon").checked;
  const cat = document.getElementById("req-cat").value;
  const text = document.getElementById("req-text").value.trim();
  if (!text) { showNotif("Please write your prayer request."); return; }
  const displayName = anon ? "Anonymous" : (name || "You");
  const now = new Date();
  const dateStr = now.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  prayers.unshift({ id: nextId++, name: displayName, anon, cat, text, date: dateStr, prayCount: 0, prayed: false, answered: false, isOwn: true });
  document.getElementById("req-name").value = "";
  document.getElementById("req-text").value = "";
  document.getElementById("req-anon").checked = false;
  showNotif("🙏 Your request has been shared with the community");
  showTab("wall");
});

// ── Daily Verses (AI-powered) ──────────────────────────────
document.getElementById("verse-cat-row").addEventListener("click", e => {
  if (!e.target.classList.contains("chip")) return;
  currentVerseCat = e.target.dataset.vcat;
  document.querySelectorAll("#verse-cat-row .chip").forEach(c => c.classList.remove("active"));
  e.target.classList.add("active");
  if (verseCache[currentVerseCat]) renderVerses(currentVerseCat);
  else loadVerses(currentVerseCat);
});

document.getElementById("refresh-btn").addEventListener("click", () => {
  delete verseCache[currentVerseCat];
  loadVerses(currentVerseCat);
});

async function loadVerses(cat) {
  const list = document.getElementById("verses-list");
  list.innerHTML = `<div class="verse-loading"><div class="spinner"></div>Finding scriptures for <em>${cat}</em>…</div>`;
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": ANTHROPIC_API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: MODEL, max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are a Bible verse guide for a church prayer community app.
Give exactly 3 Bible verses for the prayer category: "${cat}".
Respond ONLY with a valid JSON array — no markdown, no backticks, no extra text.
Each object must have exactly these keys:
- "ref": the Bible reference (e.g. "Psalm 23:1")
- "text": the verse text in NIV translation, under 60 words
- "reflection": one warm, encouraging sentence connecting this verse to someone praying for ${cat}, max 20 words
Return only: [{"ref":"...","text":"...","reflection":"..."},{"ref":"...","text":"...","reflection":"..."},{"ref":"...","text":"...","reflection":"..."}]`
        }]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "API error");
    const raw = data.content.map(i => i.text || "").join("");
    const clean = raw.replace(/```json|```/g, "").trim();
    const verses = JSON.parse(clean);
    verseCache[cat] = verses;
    renderVerses(cat);
  } catch (err) {
    console.error(err);
    list.innerHTML = `<div class="verse-loading">Could not load verses right now.<br><small style="opacity:0.6;display:block;margin-top:6px">Check your API key and try again.</small></div>`;
  }
}

function renderVerses(cat) {
  const verses = verseCache[cat];
  if (!verses) { loadVerses(cat); return; }
  document.getElementById("verses-list").innerHTML = verses.map(v => `
    <div class="verse-card">
      <div class="verse-ref">${v.ref}</div>
      <div class="verse-text">${v.text}</div>
      <div class="verse-divider"></div>
      <div class="verse-reflection">🕊 ${v.reflection}</div>
    </div>`).join("");
}

// ── Init ───────────────────────────────────────────────────
renderPrayers();
</script>
</body>
</html>
